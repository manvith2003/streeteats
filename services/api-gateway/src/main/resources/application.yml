server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: auth
          uri: ${AUTH_URL:http://localhost:8088}
          predicates: [ Path=/api/auth/** ]
        - id: vendor
          uri: ${VENDOR_URL:http://localhost:8081}
          predicates: [ Path=/api/vendors/** ]
        - id: status
          uri: ${STATUS_URL:http://localhost:8082}
          predicates: [ Path=/api/status/** ]
        - id: menu
          uri: ${MENU_URL:http://localhost:8083}
          predicates: [ Path=/api/menu/** ]
        - id: review
          uri: ${REVIEW_URL:http://localhost:8084}
          predicates: [ Path=/api/reviews/** ]
        - id: search
          uri: ${SEARCH_URL:http://localhost:8085}
          predicates: [ Path=/api/search/** ]
        - id: recommendation
          uri: ${RECO_URL:http://localhost:8086}
          predicates: [ Path=/api/recommendations/** ]
        - id: notification
          uri: ${NOTIFY_URL:http://localhost:8087}
          predicates: [ Path=/api/notifications/** ]

jwt:
  secret: ${JWT_SECRET:streeteats-dev-secret-change-me-please-32+chars}

ratelimit:
  requests-per-minute: ${RATE_LIMIT_RPM:120}
