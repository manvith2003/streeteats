server:
  port: 8086
spring:
  application:
    name: recommendation-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/streeteats}
    username: ${DB_USER:streeteats}
    password: ${DB_PASSWORD:streeteats}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

services:
  search: ${SEARCH_URL:http://localhost:8085}

streeteats:
  kafka-consumer: false   # set true (with a broker) to ingest interactions from Kafka
---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:reco;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
