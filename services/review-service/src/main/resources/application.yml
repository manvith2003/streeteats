server:
  port: 8084
spring:
  application:
    name: review-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/streeteats}
    username: ${DB_USER:streeteats}
    password: ${DB_PASSWORD:streeteats}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:review;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
