services:
  # --- PostgreSQL + PostGIS (geospatial "vendors near me") ---
  postgres:
    image: postgis/postgis:16-3.4
    container_name: se-postgres
    environment:
      POSTGRES_USER: streeteats
      POSTGRES_PASSWORD: streeteats
      POSTGRES_DB: streeteats
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  # --- Redis (hot live-status / freshness cache) ---
  redis:
    image: redis:7-alpine
    container_name: se-redis
    ports:
      - "6379:6379"

  # --- Kafka (event backbone, KRaft mode — no Zookeeper) ---
  kafka:
    image: bitnami/kafka:3.7
    container_name: se-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka-data:/bitnami/kafka

volumes:
  pgdata:
  kafka-data:
